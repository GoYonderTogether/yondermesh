name: Deploy Docs to GitHub Pages

# Build and deploy site/ (VitePress) to GitHub Pages whenever docs or source change.
# Path-filtered: pushes that don't touch site/, scripts/docs/, src/, or this workflow skip.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/docs/**'
      - 'src/**'
      - 'package.json'
      - 'README.md'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; never cancel an in-progress deploy (prevents partial publishes).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package.json

      - name: Install root deps (for `ymesh help` source extraction)
        run: npm ci

      - name: Install site deps
        run: npm ci --prefix site
        # If no lockfile exists yet, fall back to plain install.
        continue-on-error: true

      - name: Install site deps (fallback)
        if: ${{ failure() }}
        run: npm install --prefix site

      - name: Build ymesh (so `ymesh help` works in sync)
        run: npm run build

      - name: Sync auto-generated docs
        run: npm run sync --prefix site

      - name: Build docs site
        run: npm run build --prefix site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
